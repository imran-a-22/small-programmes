<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flag Signal Match</title>
<style>
  :root {
    --bg:#0b1020; --panel:#131a31; --card:#1d2747; --text:#f8fafc; --muted:#cbd5e1; --accent:#a78bfa; --good:#22c55e; --bad:#ef4444;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#030712,var(--bg));color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .app{width:min(860px,100%);background:rgba(19,26,49,0.96);border:1px solid #374151;border-radius:18px;overflow:hidden}
  header{padding:18px 22px;border-bottom:1px solid #334155}
  h1{margin:0 0 6px}
  .sub{color:var(--muted)}
  .body{padding:24px;display:grid;gap:18px}
  .hud{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted)}
  .card{background:var(--card);border-radius:18px;padding:24px;text-align:center}
  .flag{font-size:5rem;line-height:1;margin-bottom:10px}
  .question{font-size:1.3rem;margin-bottom:16px}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  button{border:none;border-radius:12px;padding:14px;font-size:1rem;cursor:pointer;background:#334155;color:#fff}
  button:hover{background:#475569}
  #message{min-height:48px;padding:12px;background:#0f172a;border-radius:12px;color:var(--muted)}
  .footer{display:flex;gap:12px;flex-wrap:wrap}
  .restart{background:var(--accent);color:#1e1b4b;font-weight:bold}
  @media (max-width:640px){.choices{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Flag Signal Match</h1>
    <div class="sub">Identify countries by their flags. Fast recognition helps build geography memory.</div>
  </header>
  <div class="body">
    <div class="hud">
      <div>Score: <strong id="score">0</strong></div>
      <div>Lives: <strong id="lives">3</strong></div>
      <div>Round: <strong id="round">1</strong>/10</div>
    </div>
    <div class="card">
      <div class="flag" id="flag">🏳️</div>
      <div class="question">Which country does this flag belong to?</div>
      <div class="choices" id="choices"></div>
    </div>
    <div id="message">Choose the correct country name.</div>
    <div class="footer"><button class="restart" id="restartBtn">Restart</button></div>
  </div>
</div>
<script>
const rounds = [
  { flag:'🇯🇵', answer:'Japan', choices:['Japan','China','South Korea','Thailand'] },
  { flag:'🇧🇷', answer:'Brazil', choices:['Argentina','Brazil','Mexico','Portugal'] },
  { flag:'🇨🇦', answer:'Canada', choices:['Canada','United States','Denmark','Austria'] },
  { flag:'🇳🇬', answer:'Nigeria', choices:['Nigeria','Ireland','Italy','India'] },
  { flag:'🇮🇹', answer:'Italy', choices:['Italy','France','Mexico','Hungary'] },
  { flag:'🇪🇬', answer:'Egypt', choices:['Egypt','Iraq','Syria','Yemen'] },
  { flag:'🇮🇳', answer:'India', choices:['India','Niger','Ivory Coast','Ireland'] },
  { flag:'🇸🇪', answer:'Sweden', choices:['Norway','Iceland','Sweden','Finland'] },
  { flag:'🇦🇺', answer:'Australia', choices:['Australia','New Zealand','United Kingdom','Fiji'] },
  { flag:'🇹🇷', answer:'Turkey', choices:['Tunisia','Turkey','Pakistan','Morocco'] }
];

const flagEl = document.getElementById('flag');
const choicesEl = document.getElementById('choices');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const roundEl = document.getElementById('round');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');

let score = 0, lives = 3, idx = 0, locked = false;

function loadRound() {
  const r = rounds[idx];
  flagEl.textContent = r.flag;
  roundEl.textContent = idx + 1;
  choicesEl.innerHTML = '';
  r.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.textContent = choice;
    btn.addEventListener('click', () => answer(choice));
    choicesEl.appendChild(btn);
  });
}

function answer(choice) {
  if (locked) return;
  const r = rounds[idx];
  if (choice === r.answer) {
    score += 10;
    messageEl.innerHTML = `<span style="color:#86efac">Correct.</span> ${r.flag} is the flag of ${r.answer}.`;
  } else {
    lives -= 1;
    messageEl.innerHTML = `<span style="color:#fca5a5">Incorrect.</span> The correct answer was ${r.answer}.`;
  }
  scoreEl.textContent = score;
  livesEl.textContent = lives;
  locked = true;
  setTimeout(() => {
    idx += 1;
    locked = false;
    if (idx >= rounds.length || lives <= 0) {
      messageEl.textContent = `Finished. Final score: ${score}. Press restart to play again.`;
      choicesEl.innerHTML = '';
      return;
    }
    loadRound();
  }, 900);
}

restartBtn.addEventListener('click', () => {
  score = 0; lives = 3; idx = 0; locked = false;
  scoreEl.textContent = score; livesEl.textContent = lives; messageEl.textContent = 'Choose the correct country name.';
  loadRound();
});

loadRound();
</script>
</body>
</html>
