<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Map Grid Hunt</title>
<style>
body{margin:0;font-family:Verdana,sans-serif;background:#f8fafc;color:#0f172a;display:flex;justify-content:center;padding:22px}
.wrap{width:min(980px,96vw);background:white;border-radius:18px;padding:18px;box-shadow:0 20px 40px rgba(15,23,42,.12)}
h1,p{text-align:center;margin:8px 0}.top{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:12px 0}.card{background:#e2e8f0;padding:10px;border-radius:12px;text-align:center;font-weight:700}
#grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;background:#cbd5e1;padding:10px;border-radius:14px}
.cell{aspect-ratio:1;border:none;border-radius:10px;background:#dbeafe;font-weight:700;font-size:20px;cursor:pointer}
.cell:hover{background:#bfdbfe}.target{background:#fde68a!important}.found{background:#86efac!important}
button{display:block;margin:14px auto 0;padding:10px 18px;border:none;border-radius:10px;background:#2563eb;color:white;font-weight:700;cursor:pointer}
#message{text-align:center;margin-top:12px;color:#334155}
</style>
</head>
<body>
<div class="wrap">
  <h1>Map Grid Hunt</h1>
  <p>Use grid references to find landmarks on the map.</p>
  <div class="top">
    <div class="card">Score: <span id="score">0</span></div>
    <div class="card">Lives: <span id="lives">3</span></div>
    <div class="card">Round: <span id="round">1</span></div>
    <div class="card">Find: <span id="targetText">B3</span></div>
  </div>
  <div id="grid"></div>
  <button id="restart">Restart</button>
  <div id="message">Columns use letters. Rows use numbers. Example: B3 means column B, row 3.</div>
</div>
<script>
const grid = document.getElementById('grid');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const roundEl = document.getElementById('round');
const targetText = document.getElementById('targetText');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restart');
const letters = 'ABCDEFGH'.split('');
let score=0,lives=3,round=1,target='A1';
function makeGrid(){
  grid.innerHTML='';
  for(let r=1;r<=8;r++){
    for(let c=0;c<8;c++){
      const btn=document.createElement('button');
      btn.className='cell';
      btn.textContent=letters[c]+r;
      btn.addEventListener('click',()=>choose(btn.textContent, btn));
      grid.appendChild(btn);
    }
  }
}
function pickTarget(){
  target = letters[Math.floor(Math.random()*8)] + (Math.floor(Math.random()*8)+1);
  targetText.textContent = target;
}
function choose(coord, btn){
  if(lives<=0)return;
  if(coord===target){
    score+=10; btn.classList.add('found'); messageEl.textContent=`Correct. ${coord} matches the target.`;
    if(score % 30 === 0) round++;
  } else {
    lives--; messageEl.textContent=`Not ${coord}. Read the letter first, then the row number.`;
  }
  update();
  if(lives<=0){ messageEl.textContent = `Game over. Final score ${score}.`; return; }
  setTimeout(()=>{document.querySelectorAll('.found').forEach(x=>x.classList.remove('found')); pickTarget();},300);
}
function update(){scoreEl.textContent=score;livesEl.textContent=lives;roundEl.textContent=round;}
function start(){score=0;lives=3;round=1;makeGrid();pickTarget();update();messageEl.textContent='Columns use letters. Rows use numbers.';}
restartBtn.addEventListener('click',start);
start();
</script>
</body>
</html>
