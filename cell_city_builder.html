<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cell City Builder</title>
<style>
  :root {
    --bg: #06202b;
    --panel: #0b3b4a;
    --card: #103d4d;
    --text: #f0fdfa;
    --muted: #c4e7ea;
    --accent: #2dd4bf;
    --good: #22c55e;
    --bad: #f97316;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: Arial, sans-serif; background: linear-gradient(180deg, #03151c, var(--bg)); color: var(--text);
    min-height: 100vh; display:flex; align-items:center; justify-content:center; padding: 18px;
  }
  .wrap { width:min(1100px,100%); background: rgba(11,59,74,0.96); border:1px solid #1d6676; border-radius:18px; overflow:hidden; }
  header { padding:18px 22px; border-bottom:1px solid #1d6676; }
  h1 { margin:0 0 6px; }
  .sub { color:var(--muted); line-height:1.5; }
  .layout { display:grid; grid-template-columns: 1fr 1fr; gap:18px; padding:20px; }
  .panel { background: rgba(16,61,77,0.95); border-radius:16px; padding:18px; }
  .bank, .targets { display:grid; gap:12px; }
  .token {
    padding:14px; border-radius:12px; background:#134e5f; border:1px solid #2b7b88; cursor:grab; user-select:none;
  }
  .token strong { display:block; margin-bottom:4px; }
  .slot {
    min-height:88px; border:2px dashed #57a6b5; border-radius:14px; padding:12px; display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#0d3341;
  }
  .slot-title { font-weight:bold; }
  .hint { color:var(--muted); font-size:0.95rem; max-width: 55%; }
  .matched { border-style: solid; border-color: var(--good); background: #0f5132; }
  .wrongflash { border-color: var(--bad); }
  .footer { display:flex; gap:14px; flex-wrap:wrap; padding:0 20px 20px; align-items:center; }
  .badge { background:#082a34; border-radius:999px; padding:10px 14px; color:var(--muted); }
  button { border:none; border-radius:12px; padding:12px 16px; background:var(--accent); color:#06202b; font-weight:bold; cursor:pointer; }
  #message { min-height: 48px; color: var(--muted); }
  @media (max-width: 820px) { .layout { grid-template-columns:1fr; } .hint { max-width:none; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Cell City Builder</h1>
    <div class="sub">Drag each organelle into the correct job slot. Think of the cell as a city: some parts make energy, some store instructions, and some package materials.</div>
  </header>
  <div class="layout">
    <section class="panel">
      <h2>Organelle bank</h2>
      <div class="bank" id="bank"></div>
    </section>
    <section class="panel">
      <h2>Function zones</h2>
      <div class="targets" id="targets"></div>
    </section>
  </div>
  <div class="footer">
    <div class="badge">Correct: <strong id="correctCount">0</strong>/5</div>
    <button id="restartBtn">Restart</button>
    <div id="message">Drag an organelle card onto the matching function zone.</div>
  </div>
</div>
<script>
const organelles = [
  { id:'nucleus', name:'Nucleus', info:'Contains DNA', match:'control' },
  { id:'mitochondria', name:'Mitochondria', info:'Releases energy', match:'energy' },
  { id:'ribosome', name:'Ribosome', info:'Builds proteins', match:'protein' },
  { id:'cellmembrane', name:'Cell Membrane', info:'Controls entry and exit', match:'gate' },
  { id:'golgi', name:'Golgi Apparatus', info:'Packages and ships materials', match:'shipping' }
];

const functions = [
  { id:'energy', title:'Power station', hint:'Makes usable energy for the cell.' },
  { id:'control', title:'City hall', hint:'Stores instructions and directs activities.' },
  { id:'protein', title:'Factory', hint:'Builds proteins from instructions.' },
  { id:'gate', title:'Security gate', hint:'Controls what enters and leaves.' },
  { id:'shipping', title:'Post office', hint:'Sorts, packages and sends materials.' }
];

const bank = document.getElementById('bank');
const targets = document.getElementById('targets');
const correctCountEl = document.getElementById('correctCount');
const messageEl = document.getElementById('message');
const restartBtn = document.getElementById('restartBtn');
let correctCount = 0;

function shuffle(array) {
  return [...array].sort(() => Math.random() - 0.5);
}

function render() {
  bank.innerHTML = '';
  targets.innerHTML = '';
  correctCount = 0;
  correctCountEl.textContent = correctCount;
  messageEl.textContent = 'Drag an organelle card onto the matching function zone.';

  shuffle(organelles).forEach(org => {
    const card = document.createElement('div');
    card.className = 'token';
    card.draggable = true;
    card.dataset.id = org.id;
    card.innerHTML = `<strong>${org.name}</strong><div>${org.info}</div>`;
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', org.id);
    });
    bank.appendChild(card);
  });

  shuffle(functions).forEach(fn => {
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.accept = fn.id;
    slot.innerHTML = `<div><div class="slot-title">${fn.title}</div><div class="hint">${fn.hint}</div></div><div>Drop here</div>`;

    slot.addEventListener('dragover', e => e.preventDefault());
    slot.addEventListener('drop', e => {
      e.preventDefault();
      const draggedId = e.dataTransfer.getData('text/plain');
      const dragged = organelles.find(o => o.id === draggedId);
      if (!dragged || slot.classList.contains('matched')) return;
      if (dragged.match === fn.id) {
        slot.classList.add('matched');
        slot.innerHTML = `<div><div class="slot-title">${fn.title}</div><div class="hint">Correct: ${dragged.name}</div></div><div>✓</div>`;
        const token = [...bank.children].find(el => el.dataset.id === draggedId);
        if (token) token.remove();
        correctCount += 1;
        correctCountEl.textContent = correctCount;
        messageEl.textContent = `${dragged.name} matched correctly.`;
        if (correctCount === organelles.length) {
          messageEl.textContent = 'You built the cell city. All 5 organelles matched correctly.';
        }
      } else {
        slot.classList.add('wrongflash');
        messageEl.textContent = `Not quite. ${dragged.name} does not belong in ${fn.title}.`;
        setTimeout(() => slot.classList.remove('wrongflash'), 500);
      }
    });

    targets.appendChild(slot);
  });
}

restartBtn.addEventListener('click', render);
render();
</script>
</body>
</html>
