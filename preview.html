<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Music Note Maze</title><meta name="viewport" content="width=device-width,initial-scale=1"><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#16213e,#0f3460);color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}.game{width:min(900px,100%);background:rgba(0,0,0,.38);border-radius:22px;padding:24px;box-shadow:0 20px 50px #0008}h1{margin:0 0 8px}.intro,.lesson{line-height:1.5;color:#dbeafe}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.stat{background:rgba(255,255,255,.12);border-radius:14px;text-align:center;padding:12px}.stat b{display:block;color:#ffd166;font-size:24px}.card{background:white;color:#172033;border-radius:18px;padding:20px;margin-top:12px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:14px}button{border:0;border-radius:14px;padding:13px;font-weight:800;cursor:pointer;background:#ffd166;color:#172033}button:hover{transform:translateY(-1px)}.next{background:#06d6a0}.reset{background:#ef476f;color:white}.feedback{min-height:58px;margin-top:14px;background:#eef2ff;border-radius:12px;padding:12px;line-height:1.45}.lesson{background:rgba(255,255,255,.1);border-radius:14px;padding:14px;margin-top:16px}@media(max-width:700px){.hud{grid-template-columns:repeat(2,1fr)}.choices{grid-template-columns:1fr}}
body{background:linear-gradient(135deg,#111827,#7c3aed)}.staff{height:160px;background:#fff;border-radius:16px;position:relative;margin:12px 0;border:3px solid #c4b5fd}.line{position:absolute;left:35px;right:35px;height:3px;background:#111827}.l1{top:32px}.l2{top:58px}.l3{top:84px}.l4{top:110px}.l5{top:136px}.note{position:absolute;left:50%;top:76px;transform:translate(-50%,-50%);font-size:64px;color:#111827}</style></head><body><div class="game"><h1>Music Note Maze</h1><p class="intro">Escape rooms by choosing the correct rhythm value for each music note or rest.</p><div class="hud"><div class="stat">Score<b id="score">0</b></div><div class="stat">Keys<b id="keys">0</b></div><div class="stat">Room<b id="room">1</b></div><div class="stat">Mistakes<b id="mistakes">0</b></div></div><div class="card"><h2 id="prompt"></h2><div class="staff"><div class="line l1"></div><div class="line l2"></div><div class="line l3"></div><div class="line l4"></div><div class="line l5"></div><div class="note" id="symbol">♩</div></div><div class="choices" id="choices"></div><div class="feedback" id="fb">Choose the correct beat value.</div><button class="next" onclick="next()">Next Room</button> <button class="reset" onclick="reset()">Reset</button></div><div class="lesson"><b>Mini lesson:</b> A whole note is usually 4 beats, a half note is 2 beats, a quarter note is 1 beat, and an eighth note is half a beat.</div></div><script>
const qs=[
{s:'𝅝',n:'whole note',a:'4 beats',e:'A whole note usually lasts 4 beats.'},
{s:'𝅗𝅥',n:'half note',a:'2 beats',e:'A half note usually lasts 2 beats.'},
{s:'♩',n:'quarter note',a:'1 beat',e:'A quarter note usually lasts 1 beat.'},
{s:'♪',n:'eighth note',a:'1/2 beat',e:'An eighth note is half a quarter note.'},
{s:'𝄻',n:'whole rest',a:'4 beats',e:'A whole rest is silence for 4 beats.'},
{s:'𝄼',n:'quarter rest',a:'1 beat',e:'A quarter rest is silence for 1 beat.'}
];const opts=['4 beats','2 beats','1 beat','1/2 beat'];let i=0,scoreVal=0,keysVal=0,mistakesVal=0,answered=false;
function sh(a){return [...a].sort(()=>Math.random()-.5)}
function draw(){answered=false;let x=qs[i%qs.length];symbol.textContent=x.s;prompt.textContent='What is the value of this '+x.n+'?';score.textContent=scoreVal;keys.textContent=keysVal;room.textContent=i%qs.length+1;mistakes.textContent=mistakesVal;choices.innerHTML='';sh(opts).forEach(o=>{let b=document.createElement('button');b.textContent=o;b.onclick=()=>pick(o);choices.appendChild(b)});fb.textContent='Pick the correct door.'}
function pick(o){if(answered)return;answered=true;let x=qs[i%qs.length];if(o===x.a){scoreVal+=10;keysVal++;fb.innerHTML='<b>Correct.</b> '+x.e+' You earned a key.'}else{mistakesVal++;fb.innerHTML='<b>Incorrect.</b> Answer: '+x.a+'. '+x.e}score.textContent=scoreVal;keys.textContent=keysVal;mistakes.textContent=mistakesVal}
function next(){i++;draw()}function reset(){i=0;scoreVal=0;keysVal=0;mistakesVal=0;draw()}draw();
</script></body></html>
