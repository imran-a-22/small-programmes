<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashCard Battle — CS Trivia RPG</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0a2e;
    --surface: #240d3d;
    --card-bg: #2d1554;
    --border: #4a2080;
    --border-light: #7a40c0;
    --text: #e8d5ff;
    --muted: #9b7bc0;
    --gold: #ffd700;
    --gold2: #ffb347;
    --green: #4dff91;
    --red: #ff4d6d;
    --blue: #4dc3ff;
    --purple: #c77dff;
    --hp-green: #2ecc71;
    --hp-red: #e74c3c;
    --xp-bar: #9b59b6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at top, #2a0a4e 0%, #1a0a2e 60%);
    color: var(--text);
    font-family: 'Crimson Pro', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 1rem;
  }
  /* Stars bg */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, rgba(255,215,0,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 45%, rgba(200,150,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 80%, rgba(255,215,0,0.2) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }
  .wrapper { max-width: 720px; width: 100%; position: relative; z-index: 1; }

  h1 {
    font-family: 'Cinzel', serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    font-weight: 900;
    text-align: center;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
    letter-spacing: 0.05em;
    margin-bottom: 0.2rem;
  }
  .tagline { text-align: center; color: var(--muted); font-style: italic; margin-bottom: 1.5rem; }

  /* Battle scene */
  .battle-scene {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 1.5rem;
    gap: 1rem;
  }

  /* Character panels */
  .char-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.8rem;
    flex: 1;
    max-width: 200px;
  }
  .char-name {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    color: var(--gold);
    margin-bottom: 0.4rem;
    letter-spacing: 0.05em;
  }
  .char-sprite {
    font-size: 2.5rem;
    text-align: center;
    margin: 0.3rem 0;
    line-height: 1;
    filter: drop-shadow(0 0 8px rgba(157,78,221,0.5));
  }
  .hp-bar-wrap { margin-bottom: 0.4rem; }
  .hp-label { font-size: 0.7rem; color: var(--muted); display: flex; justify-content: space-between; }
  .hp-bar { height: 8px; background: #1a0028; border-radius: 4px; overflow: hidden; margin-top: 2px; }
  .hp-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .hp-fill.hero { background: linear-gradient(90deg, var(--hp-green), #52d994); }
  .hp-fill.enemy { background: linear-gradient(90deg, var(--hp-red), #ff6b81); }
  .xp-bar { height: 4px; background: #1a0028; border-radius: 2px; overflow: hidden; margin-top: 3px; }
  .xp-fill { height: 100%; background: var(--xp-bar); border-radius: 2px; transition: width 0.4s ease; }

  /* vs */
  .vs {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--muted);
    text-align: center;
    flex-shrink: 0;
  }

  /* Enemy health */
  .enemy-panel { text-align: center; }
  .enemy-sprite { animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  /* Flashcard */
  .flashcard {
    background: var(--card-bg);
    border: 2px solid var(--border-light);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.2rem;
    position: relative;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
    min-height: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .flashcard::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
  }
  .deck-badge {
    position: absolute;
    top: 0.7rem; left: 0.7rem;
    font-size: 0.65rem;
    font-family: 'Cinzel', serif;
    color: var(--purple);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .diff-badge {
    position: absolute;
    top: 0.7rem; right: 0.7rem;
    font-size: 0.65rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-weight: 600;
  }
  .diff-badge.easy { background: rgba(77,255,145,0.15); color: var(--green); border: 1px solid rgba(77,255,145,0.3); }
  .diff-badge.medium { background: rgba(255,179,71,0.15); color: var(--gold2); border: 1px solid rgba(255,179,71,0.3); }
  .diff-badge.hard { background: rgba(255,77,109,0.15); color: var(--red); border: 1px solid rgba(255,77,109,0.3); }

  .card-front, .card-back { width: 100%; text-align: center; }
  .card-question {
    font-size: clamp(1rem, 3vw, 1.25rem);
    color: var(--text);
    line-height: 1.5;
    margin: 0.5rem 0;
  }
  .card-hint { font-size: 0.85rem; color: var(--muted); font-style: italic; margin-top: 0.5rem; }
  .card-answer {
    font-size: clamp(1.1rem, 3.5vw, 1.4rem);
    color: var(--gold);
    font-weight: 600;
    margin: 0.5rem 0;
    display: none;
  }
  .card-explanation { font-size: 0.9rem; color: var(--muted); margin-top: 0.5rem; display: none; line-height: 1.5; }
  .card-answer.show, .card-explanation.show { display: block; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 0.7rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }
  .btn {
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    font-weight: 700;
    padding: 0.7rem 1.3rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .btn-reveal {
    background: linear-gradient(135deg, #5a1a8a, #7a2abf);
    color: var(--gold);
    border: 1px solid var(--border-light);
    box-shadow: 0 4px 15px rgba(90,26,138,0.4);
  }
  .btn-reveal:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(90,26,138,0.6); }
  .btn-known {
    background: linear-gradient(135deg, #1a4d2e, #267a47);
    color: var(--green);
    border: 1px solid rgba(77,255,145,0.3);
  }
  .btn-known:hover { transform: translateY(-2px); }
  .btn-unknown {
    background: linear-gradient(135deg, #4d1a22, #7a2633);
    color: var(--red);
    border: 1px solid rgba(255,77,109,0.3);
  }
  .btn-unknown:hover { transform: translateY(-2px); }
  .btn-neutral {
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .btn-neutral:hover { background: rgba(255,255,255,0.1); }
  .btn:disabled { opacity: 0.3; cursor: default; transform: none !important; }

  /* Deck selector */
  .deck-tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .deck-tab {
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    padding: 0.45rem 0.9rem;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .deck-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.08); }

  /* Progress */
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    font-size: 0.85rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .prog-item { display: flex; align-items: center; gap: 0.4rem; }
  .prog-dot { width: 8px; height: 8px; border-radius: 50%; }
  .prog-dot.known { background: var(--green); }
  .prog-dot.unknown { background: var(--red); }
  .prog-dot.unseen { background: var(--muted); }
  .prog-n { font-weight: 600; }

  /* Battle log */
  .battle-log {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    min-height: 1.2rem;
    font-style: italic;
    margin-top: 0.5rem;
  }
  .battle-log.hit { color: var(--green); }
  .battle-log.miss { color: var(--red); }

  /* Animations */
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
  @keyframes bounce { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
  .shake { animation: shake 0.3s; }
  .bounce { animation: bounce 0.3s; }

  /* Game over */
  .game-over {
    display: none;
    text-align: center;
    padding: 2rem;
    background: var(--surface);
    border: 2px solid var(--border-light);
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(90,26,138,0.4);
  }
  .game-over.show { display: block; }
  .game-over h2 { font-family: 'Cinzel', serif; font-size: 1.8rem; margin-bottom: 1rem; }
  .game-over.win h2 { color: var(--gold); text-shadow: 0 0 20px rgba(255,215,0,0.5); }
  .game-over.lose h2 { color: var(--red); }
  .game-over p { color: var(--muted); margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="wrapper">
  <h1>⚔️ FLASHCARD BATTLE</h1>
  <p class="tagline">Master CS concepts. Defeat the Code Wizard.</p>

  <!-- Deck selector -->
  <div class="deck-tabs">
    <button class="deck-tab active" onclick="selectDeck('html')">HTML/CSS</button>
    <button class="deck-tab" onclick="selectDeck('js')">JavaScript</button>
    <button class="deck-tab" onclick="selectDeck('cs')">CS Theory</button>
    <button class="deck-tab" onclick="selectDeck('git')">Git & CLI</button>
  </div>

  <!-- Battle scene -->
  <div class="battle-scene">
    <div class="char-panel">
      <div class="char-name">🧙 HERO CODER</div>
      <div class="char-sprite">🧑‍💻</div>
      <div class="hp-bar-wrap">
        <div class="hp-label"><span>HP</span><span id="hero-hp-txt">100/100</span></div>
        <div class="hp-bar"><div class="hp-fill hero" id="hero-hp" style="width:100%"></div></div>
      </div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
      <div style="font-size:0.7rem;color:var(--muted);margin-top:3px">XP: <span id="xp-txt">0</span></div>
    </div>

    <div class="vs">VS</div>

    <div class="char-panel enemy-panel">
      <div class="char-name" style="text-align:center;color:var(--red)">👾 CODE WIZARD</div>
      <div class="char-sprite enemy-sprite" id="enemy-sprite">🧙‍♂️</div>
      <div class="hp-bar-wrap">
        <div class="hp-label"><span>HP</span><span id="enemy-hp-txt">100/100</span></div>
        <div class="hp-bar"><div class="hp-fill enemy" id="enemy-hp" style="width:100%"></div></div>
      </div>
    </div>
  </div>

  <!-- Main card area -->
  <div id="main-area">
    <div class="flashcard" id="flashcard">
      <span class="deck-badge" id="deck-badge">HTML/CSS</span>
      <span class="diff-badge easy" id="diff-badge">EASY</span>
      <div class="card-question" id="card-question">Loading your quest...</div>
      <div class="card-hint" id="card-hint"></div>
      <div class="card-answer" id="card-answer"></div>
      <div class="card-explanation" id="card-explanation"></div>
    </div>

    <div class="btn-row" id="btn-row-reveal">
      <button class="btn btn-reveal" onclick="revealAnswer()">🔮 Reveal Answer</button>
      <button class="btn btn-neutral" onclick="skipCard()">Skip</button>
    </div>
    <div class="btn-row" id="btn-row-grade" style="display:none">
      <button class="btn btn-known" onclick="gradeCard(true)">✅ I Knew It! (+20 DMG)</button>
      <button class="btn btn-unknown" onclick="gradeCard(false)">❌ Didn't Know (-15 HP)</button>
    </div>

    <div class="battle-log" id="battle-log">Choose a deck and reveal the first card!</div>

    <div class="progress-info">
      <div class="prog-item"><div class="prog-dot known"></div><span class="prog-n" id="known-n">0</span> Known</div>
      <div class="prog-item"><div class="prog-dot unknown"></div><span class="prog-n" id="unknown-n">0</span> Learning</div>
      <div class="prog-item"><div class="prog-dot unseen"></div><span class="prog-n" id="unseen-n">0</span> Remaining</div>
      <div class="prog-item" style="color:var(--gold)">🏆 <span id="combo-n">0</span>x Combo</div>
    </div>
  </div>

  <div class="game-over" id="game-over">
    <h2 id="go-title">VICTORY!</h2>
    <p id="go-text"></p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn btn-reveal" onclick="restartGame()">⚔️ Play Again</button>
    </div>
  </div>
</div>

<script>
const DECKS = {
  html: {
    name: 'HTML/CSS',
    icon: '🌐',
    cards: [
      { q: 'What does the <DOCTYPE html> declaration do?', a: 'Tells the browser to use HTML5 standards mode', hint: 'Goes at the very top of every HTML file', explain: 'Without it, browsers may render in "quirks mode" which emulates old browser bugs.', diff: 'easy' },
      { q: 'What is the CSS Box Model?', a: 'Content → Padding → Border → Margin', hint: 'Every element is a box with 4 layers', explain: 'Each HTML element is modeled as a rectangular box. The box model defines how these layers contribute to the element\'s total size.', diff: 'easy' },
      { q: 'What is the difference between "display: none" and "visibility: hidden"?', a: 'display:none removes from flow; visibility:hidden hides but keeps space', hint: 'One affects layout, the other doesn\'t', explain: 'display:none completely removes the element from the document flow. visibility:hidden makes it invisible but it still occupies space.', diff: 'medium' },
      { q: 'What does "position: absolute" position relative to?', a: 'The nearest ancestor with a non-static position', hint: 'It escapes the normal document flow', explain: 'If no positioned ancestor exists, it positions relative to the initial containing block (the viewport).', diff: 'medium' },
      { q: 'What is the difference between em and rem units?', a: 'em = relative to parent font-size; rem = relative to root (html) font-size', hint: 'One cascades, the other is consistent', explain: 'em can compound through nested elements which makes it unpredictable. rem is always relative to the root font-size, making it more predictable.', diff: 'medium' },
      { q: 'What is CSS specificity?', a: 'A scoring system that determines which CSS rule takes precedence', hint: 'Inline > ID > Class > Element', explain: 'Inline styles=1000, IDs=100, Classes/attributes=10, Elements=1. Higher specificity wins; equal specificity defers to the last rule.', diff: 'hard' },
      { q: 'What is the CSS "z-index" property?', a: 'Controls the stacking order of positioned elements', hint: 'Higher numbers appear on top', explain: 'z-index only works on positioned elements (position: relative/absolute/fixed/sticky). Elements with higher z-index values appear in front.', diff: 'easy' },
      { q: 'What does "flex: 1" mean?', a: 'flex-grow: 1, flex-shrink: 1, flex-basis: 0% — grow to fill available space', hint: 'A shorthand for three flex properties', explain: 'flex: 1 makes an element grow to fill available space equally with other flex: 1 siblings. Very useful for equal-width columns.', diff: 'medium' },
    ]
  },
  js: {
    name: 'JavaScript',
    icon: '🟨',
    cards: [
      { q: 'What is the difference between "==" and "==="?', a: '=== checks type AND value; == only checks value (with coercion)', hint: 'One is strict, one is loose', explain: '"0" == 0 is true, but "0" === 0 is false. Always prefer === to avoid unexpected type coercions.', diff: 'easy' },
      { q: 'What is event bubbling?', a: 'Events propagate up from child to parent elements automatically', hint: 'Events travel upward through the DOM', explain: 'When you click a child element, the event fires on the child first, then propagates up through each parent. Use event.stopPropagation() to prevent this.', diff: 'medium' },
      { q: 'What is a closure?', a: 'A function that retains access to its outer scope even after the outer function has returned', hint: 'Inner functions remember their birthplace', explain: 'Closures are fundamental to JS. They enable data privacy, factory functions, and are the basis for module patterns. useState in React is built on closures.', diff: 'hard' },
      { q: 'What does "async/await" do?', a: 'Syntactic sugar over Promises that allows writing async code in a synchronous style', hint: 'Makes Promises readable', explain: 'async functions always return a Promise. await pauses execution until the Promise resolves. Error handling uses try/catch instead of .catch().', diff: 'medium' },
      { q: 'What is "hoisting" in JavaScript?', a: 'Variable and function declarations are moved to the top of their scope before execution', hint: 'Declarations come before assignments', explain: 'var is hoisted and initialized as undefined. let/const are hoisted but not initialized (temporal dead zone). Function declarations are fully hoisted.', diff: 'hard' },
      { q: 'What is the difference between "null" and "undefined"?', a: 'undefined = variable declared but not assigned; null = intentional absence of value', hint: 'One is accidental, one is intentional', explain: 'typeof undefined is "undefined". typeof null is "object" (a historical bug in JS). undefined is the default, null must be explicitly assigned.', diff: 'easy' },
      { q: 'What does the spread operator (...) do?', a: 'Expands an iterable into individual elements', hint: 'Useful for copying arrays and objects', explain: 'Used to spread arrays into function args ([...arr]), merge arrays, or clone objects ({...obj}). Introduced in ES6.', diff: 'easy' },
      { q: 'What is "this" in JavaScript?', a: 'Refers to the object that is executing the current function', hint: 'Context-dependent — changes based on how a function is called', explain: 'In a method, "this" refers to the object. In a regular function, it refers to the global object (or undefined in strict mode). Arrow functions don\'t have their own "this".', diff: 'hard' },
    ]
  },
  cs: {
    name: 'CS Theory',
    icon: '🧠',
    cards: [
      { q: 'What is Big O notation?', a: 'A way to describe the worst-case growth rate of an algorithm\'s time or space usage', hint: 'Measures algorithm efficiency as input grows', explain: 'O(1) = constant, O(log n) = logarithmic, O(n) = linear, O(n log n) = linearithmic, O(n²) = quadratic. We care about large n behavior.', diff: 'easy' },
      { q: 'What is a stack data structure?', a: 'A LIFO (Last In, First Out) collection — push and pop from the same end', hint: 'Like a stack of plates', explain: 'Stacks are used for: function call stacks, undo operations, expression evaluation, backtracking algorithms, and browser history navigation.', diff: 'easy' },
      { q: 'What is the difference between a stack and a queue?', a: 'Stack = LIFO (Last In First Out); Queue = FIFO (First In First Out)', hint: 'Stack of plates vs waiting in line', explain: 'Stacks use push/pop. Queues use enqueue/dequeue. Queues are used in BFS, task scheduling, and message queues.', diff: 'easy' },
      { q: 'What is a hash table?', a: 'A data structure that maps keys to values using a hash function for O(1) average lookup', hint: 'Powers objects/dictionaries in most languages', explain: 'Collisions are handled by chaining or open addressing. JavaScript objects and Python dicts are hash tables under the hood.', diff: 'medium' },
      { q: 'What is recursion?', a: 'A function that calls itself with a smaller input until reaching a base case', hint: 'Divide the problem into itself', explain: 'Every recursive solution needs: (1) a base case to stop recursion, and (2) a recursive case that progresses toward the base case.', diff: 'easy' },
      { q: 'What is Binary Search?', a: 'An O(log n) search algorithm that halves the search space at each step on a sorted array', hint: 'Guess the middle, eliminate half', explain: 'Binary search requires the array to be sorted. Each comparison eliminates half the remaining elements, giving O(log n) time vs O(n) for linear search.', diff: 'easy' },
      { q: 'What is a graph data structure?', a: 'A collection of nodes (vertices) connected by edges, which can be directed or undirected', hint: 'Think of roads connecting cities', explain: 'Graphs model networks, relationships, maps, social networks. Common algorithms: BFS, DFS, Dijkstra\'s shortest path, topological sort.', diff: 'medium' },
      { q: 'What is the difference between DFS and BFS?', a: 'DFS uses a stack and goes deep first; BFS uses a queue and explores neighbors first', hint: 'Depth-First vs Breadth-First traversal', explain: 'DFS: good for path finding, topological sort, maze solving. BFS: good for shortest path in unweighted graphs, level-order traversal.', diff: 'hard' },
    ]
  },
  git: {
    name: 'Git & CLI',
    icon: '🐙',
    cards: [
      { q: 'What does "git commit -m" do?', a: 'Creates a snapshot (commit) of staged changes with a message', hint: 'Saves your progress with a label', explain: 'A commit is a permanent snapshot of your staged changes. The -m flag lets you add a message inline. Good commit messages explain "what" and "why".', diff: 'easy' },
      { q: 'What is the difference between "git merge" and "git rebase"?', a: 'merge creates a merge commit; rebase replays commits on top of another branch (linear history)', hint: 'One preserves history, one rewrites it', explain: 'Merge is safer and preserves complete history. Rebase creates a cleaner linear history but should not be used on shared/public branches.', diff: 'hard' },
      { q: 'What does "git stash" do?', a: 'Temporarily saves uncommitted changes so you can switch branches without committing', hint: 'A temporary shelf for your work', explain: 'git stash pop restores the stashed changes. Useful when you need to quickly switch context without making a "work in progress" commit.', diff: 'medium' },
      { q: 'What does "git pull" actually do?', a: 'Runs "git fetch" then "git merge" — fetches remote changes and merges them into current branch', hint: 'Two commands in one', explain: 'git fetch only downloads changes; git pull downloads AND integrates them. git pull --rebase uses rebase instead of merge for integration.', diff: 'medium' },
      { q: 'What is a ".gitignore" file?', a: 'Specifies intentionally untracked files that Git should ignore (e.g. node_modules, .env)', hint: 'Tells Git what NOT to track', explain: 'Common patterns: node_modules/, *.log, .env, dist/. The file uses glob patterns. GitHub provides templates for common languages and frameworks.', diff: 'easy' },
      { q: 'What does "git reset --hard HEAD~1" do?', a: 'Discards the last commit AND all its changes permanently', hint: 'A destructive undo — be careful!', explain: 'HEAD~1 means one commit before HEAD. --hard removes both the commit and the working directory changes. --soft keeps changes staged. --mixed (default) keeps changes unstaged.', diff: 'hard' },
      { q: 'What is a "detached HEAD" state?', a: 'HEAD points directly to a commit instead of a branch name', hint: 'You\'re not on any branch', explain: 'When you checkout a specific commit (not a branch), Git enters detached HEAD. New commits won\'t be on any branch and may be lost. Create a branch to keep them.', diff: 'hard' },
      { q: 'What does "ls -la" do in the terminal?', a: 'Lists all files (including hidden) in long format with permissions, sizes, and dates', hint: 'l = long format, a = all (including hidden)', explain: 'ls lists files. -l shows detailed info (permissions, owner, size, date). -a shows files starting with "." (hidden files like .gitignore, .env).', diff: 'easy' },
    ]
  }
};

let currentDeck = 'html';
let cards = [];
let currentIdx = 0;
let heroHP = 100;
let enemyHP = 100;
let knownCards = [];
let unknownCards = [];
let xp = 0;
let combo = 0;
let revealed = false;

function selectDeck(d) {
  currentDeck = d;
  document.querySelectorAll('.deck-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  startGame();
}

function startGame() {
  cards = [...DECKS[currentDeck].cards].sort(() => Math.random() - 0.5);
  currentIdx = 0; heroHP = 100; enemyHP = 100;
  xp = 0; combo = 0; knownCards = []; unknownCards = [];
  revealed = false;
  document.getElementById('game-over').classList.remove('show', 'win', 'lose');
  document.getElementById('main-area').style.display = 'block';
  updateBattleUI();
  loadCard();
}

function loadCard() {
  if (currentIdx >= cards.length) { checkGameOver(); return; }
  const card = cards[currentIdx];
  revealed = false;
  document.getElementById('deck-badge').textContent = DECKS[currentDeck].name;
  document.getElementById('diff-badge').textContent = card.diff.toUpperCase();
  document.getElementById('diff-badge').className = 'diff-badge ' + card.diff;
  document.getElementById('card-question').textContent = card.q;
  document.getElementById('card-hint').textContent = 'Hint: ' + (card.hint || '');
  document.getElementById('card-answer').textContent = '⚡ ' + card.a;
  document.getElementById('card-answer').classList.remove('show');
  document.getElementById('card-explanation').textContent = card.explain;
  document.getElementById('card-explanation').classList.remove('show');
  document.getElementById('btn-row-reveal').style.display = 'flex';
  document.getElementById('btn-row-grade').style.display = 'none';
  document.getElementById('battle-log').textContent = `Card ${currentIdx+1}/${cards.length} — Think before you reveal!`;
  document.getElementById('battle-log').className = 'battle-log';
  updateProgress();
}

function revealAnswer() {
  revealed = true;
  document.getElementById('card-answer').classList.add('show');
  document.getElementById('card-explanation').classList.add('show');
  document.getElementById('btn-row-reveal').style.display = 'none';
  document.getElementById('btn-row-grade').style.display = 'flex';
  document.getElementById('battle-log').textContent = 'Did you know the answer?';
}

function skipCard() {
  cards.push(cards[currentIdx]);
  currentIdx++;
  loadCard();
}

function gradeCard(knew) {
  const card = cards[currentIdx];
  const dmg = knew ? (10 + combo * 5) : 0;

  if (knew) {
    knownCards.push(card);
    enemyHP = Math.max(0, enemyHP - Math.min(dmg, 20));
    xp += card.diff === 'hard' ? 30 : card.diff === 'medium' ? 20 : 10;
    combo++;
    document.getElementById('enemy-sprite').classList.add('shake');
    setTimeout(() => document.getElementById('enemy-sprite').classList.remove('shake'), 300);
    document.getElementById('battle-log').textContent = `⚔️ Critical hit! Dealt ${Math.min(dmg,20)} damage! ${combo > 1 ? `(${combo}x combo!)` : ''}`;
    document.getElementById('battle-log').className = 'battle-log hit';
  } else {
    unknownCards.push(card);
    heroHP = Math.max(0, heroHP - 15);
    combo = 0;
    document.getElementById('flashcard').classList.add('shake');
    setTimeout(() => document.getElementById('flashcard').classList.remove('shake'), 300);
    document.getElementById('battle-log').textContent = `💔 The Wizard strikes back! -15 HP`;
    document.getElementById('battle-log').className = 'battle-log miss';
  }

  currentIdx++;
  updateBattleUI();
  updateProgress();

  if (heroHP <= 0 || enemyHP <= 0) {
    setTimeout(() => checkGameOver(), 600);
  } else {
    setTimeout(() => loadCard(), 400);
  }
}

function updateBattleUI() {
  document.getElementById('hero-hp').style.width = heroHP + '%';
  document.getElementById('hero-hp-txt').textContent = heroHP + '/100';
  document.getElementById('enemy-hp').style.width = enemyHP + '%';
  document.getElementById('enemy-hp-txt').textContent = enemyHP + '/100';
  const xpPct = Math.min((xp / 200) * 100, 100);
  document.getElementById('xp-fill').style.width = xpPct + '%';
  document.getElementById('xp-txt').textContent = xp;
  document.getElementById('combo-n').textContent = combo;
}

function updateProgress() {
  document.getElementById('known-n').textContent = knownCards.length;
  document.getElementById('unknown-n').textContent = unknownCards.length;
  document.getElementById('unseen-n').textContent = Math.max(0, cards.length - currentIdx);
}

function checkGameOver() {
  const go = document.getElementById('game-over');
  document.getElementById('main-area').style.display = 'none';
  go.classList.add('show');

  if (heroHP <= 0) {
    go.classList.add('lose');
    document.getElementById('go-title').textContent = '💀 DEFEATED!';
    document.getElementById('go-text').textContent = `The Code Wizard wins this round! You knew ${knownCards.length}/${cards.length} cards. Study the ${unknownCards.length} missed cards and try again!`;
  } else if (enemyHP <= 0 || (currentIdx >= cards.length && heroHP > enemyHP)) {
    go.classList.add('win');
    document.getElementById('go-title').textContent = '🏆 VICTORY!';
    document.getElementById('go-text').textContent = `You defeated the Code Wizard! Score: ${xp} XP | Mastered: ${knownCards.length}/${cards.length} cards | Max Combo: ${combo}x`;
  } else {
    go.classList.add('win');
    document.getElementById('go-title').textContent = '🎓 COMPLETE!';
    document.getElementById('go-text').textContent = `Deck cleared! XP: ${xp} | Known: ${knownCards.length}/${cards.length} | Review the ${unknownCards.length} unknown cards.`;
  }
}

function restartGame() { startGame(); }

// Auto start
startGame();
</script>
