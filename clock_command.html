<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Clock Command</title>
<style>
body{margin:0;background:#111827;color:#f8fafc;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh}
.wrap{width:min(920px,95vw);background:#1f2937;border-radius:18px;padding:20px;box-shadow:0 18px 40px rgba(0,0,0,.35)}
h1,p{text-align:center} .hud{display:flex;justify-content:space-around;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.card{background:#374151;padding:10px 16px;border-radius:12px}
#clockBox{display:flex;justify-content:center;align-items:center;gap:22px;flex-wrap:wrap}
canvas{background:#0f172a;border-radius:50%;border:4px solid #64748b}
.controls{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
button{padding:12px;border:none;border-radius:10px;font-weight:700;background:#93c5fd;color:#0f172a;cursor:pointer}
#msg{text-align:center;margin-top:12px;color:#cbd5e1}
</style>
</head>
<body>
<div class="wrap">
  <h1>Clock Command</h1>
  <p>Set the analogue clock to the target time.</p>
  <div class="hud">
    <div class="card">Score: <span id="score">0</span></div>
    <div class="card">Lives: <span id="lives">3</span></div>
    <div class="card">Target: <span id="target"></span></div>
  </div>
  <div id="clockBox"><canvas id="clock" width="320" height="320"></canvas></div>
  <div class="controls">
    <button id="hourMinus">Hour -</button>
    <button id="hourPlus">Hour +</button>
    <button id="minMinus">Min -</button>
    <button id="minPlus">Min +</button>
  </div>
  <div class="controls" style="grid-template-columns:1fr 1fr;">
    <button id="check">Check Time</button>
    <button id="restart">Restart</button>
  </div>
  <div id="msg">Move the hands until the clock matches the target.</div>
</div>
<script>
const canvas=document.getElementById('clock'); const ctx=canvas.getContext('2d');
const scoreEl=document.getElementById('score'), livesEl=document.getElementById('lives'), targetEl=document.getElementById('target'), msg=document.getElementById('msg');
let currentHour=3,currentMinute=0,targetHour=7,targetMinute=30,score=0,lives=3;
function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function pad(n){return String(n).padStart(2,'0')}
function newTarget(){targetHour=Math.floor(Math.random()*12)+1; targetMinute=rand([0,5,10,15,20,25,30,35,40,45,50,55]); targetEl.textContent=`${targetHour}:${pad(targetMinute)}`;}
function draw(){
  ctx.clearRect(0,0,320,320);
  ctx.save(); ctx.translate(160,160);
  ctx.fillStyle='#e2e8f0'; ctx.beginPath(); ctx.arc(0,0,145,0,Math.PI*2); ctx.fill();
  for(let n=1;n<=12;n++){
    const ang=(n*Math.PI/6)-Math.PI/2; ctx.fillStyle='#0f172a'; ctx.font='20px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(n, Math.cos(ang)*115, Math.sin(ang)*115);
  }
  for(let i=0;i<60;i++){
    const ang=(i*Math.PI/30)-Math.PI/2;
    ctx.strokeStyle='#334155'; ctx.lineWidth=i%5===0?4:2; ctx.beginPath();
    ctx.moveTo(Math.cos(ang)*125,Math.sin(ang)*125); ctx.lineTo(Math.cos(ang)*135,Math.sin(ang)*135); ctx.stroke();
  }
  const minAng=(currentMinute*Math.PI/30)-Math.PI/2;
  const hourValue=(currentHour%12)+(currentMinute/60);
  const hourAng=(hourValue*Math.PI/6)-Math.PI/2;
  ctx.strokeStyle='#2563eb'; ctx.lineWidth=8; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(hourAng)*70,Math.sin(hourAng)*70); ctx.stroke();
  ctx.strokeStyle='#dc2626'; ctx.lineWidth=5; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(minAng)*100,Math.sin(minAng)*100); ctx.stroke();
  ctx.fillStyle='#0f172a'; ctx.beginPath(); ctx.arc(0,0,7,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function update(){scoreEl.textContent=score;livesEl.textContent=lives;draw();}
function adjustHour(d){currentHour=((currentHour-1+d+12)%12)+1; update();}
function adjustMinute(d){currentMinute=(currentMinute+d+60)%60; update();}
function check(){
  if(currentHour===targetHour && currentMinute===targetMinute){score+=10; msg.textContent='Correct time.'; newTarget();}
  else {lives--; msg.textContent=`Not quite. You set ${currentHour}:${pad(currentMinute)}.`;}
  if(lives<=0){msg.textContent=`Game over. Final score ${score}.`;}
  update();
}
function start(){score=0;lives=3;currentHour=3;currentMinute=0;newTarget();msg.textContent='Move the hands until the clock matches the target.';update();}
document.getElementById('hourMinus').onclick=()=>adjustHour(-1);
document.getElementById('hourPlus').onclick=()=>adjustHour(1);
document.getElementById('minMinus').onclick=()=>adjustMinute(-5);
document.getElementById('minPlus').onclick=()=>adjustMinute(5);
document.getElementById('check').onclick=()=>{if(lives>0)check();};
document.getElementById('restart').onclick=start;
start();
</script>
</body>
</html>
