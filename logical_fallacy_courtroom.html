<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Logical Fallacy Courtroom</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:linear-gradient(135deg,#2b1206,#7a3b17);font-family:Georgia,serif;display:flex;align-items:center;justify-content:center;padding:20px;color:#2b1206}.court{width:min(1000px,100%);background:#fff3dd;border:8px solid #3b1d0e;border-radius:10px;box-shadow:0 25px 60px #0007}header{background:#3b1d0e;color:#fff3dd;text-align:center;padding:22px}h1{margin:0;font-size:36px}.wrap{display:grid;grid-template-columns:.9fr 1.1fr;gap:18px;padding:22px}.judge,.case{background:#fffaf0;border:3px solid #6b2f12;border-radius:10px;padding:18px}.bench{height:210px;background:linear-gradient(#8b4513,#4c2108);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:100px}.hud{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}.stat{background:#efd3a6;border-radius:8px;text-align:center;padding:10px}.stat b{display:block;font-size:26px}.argument{font-size:23px;line-height:1.45;background:#efd3a6;border-left:8px solid #7a2d12;border-radius:8px;padding:16px}.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px}button{border:2px solid #3b1d0e;background:#fffaf0;border-radius:8px;padding:12px;font-weight:bold;cursor:pointer}button:hover{background:#efd3a6}.feedback{min-height:70px;background:#efd3a6;margin-top:14px;padding:13px;border-radius:8px;line-height:1.5}.lesson{padding:0 22px 22px;line-height:1.5}@media(max-width:800px){.wrap{grid-template-columns:1fr}.choices{grid-template-columns:1fr}}</style></head><body><main class="court"><header><h1>Logical Fallacy Courtroom</h1><p>Read the argument and identify the reasoning mistake.</p></header><section class="wrap"><div class="judge"><div class="bench">⚖️</div><div class="hud"><div class="stat">Score<b id="score">0</b></div><div class="stat">Objections<b id="lives">3</b></div><div class="stat">Case<b id="caseNo">1</b></div><div class="stat">Rank<b id="rank">Clerk</b></div></div></div><div class="case"><h2>Case Evidence</h2><div class="argument" id="argument"></div><div class="choices" id="choices"></div><div class="feedback" id="feedback">Select the fallacy.</div><button onclick="next()">Next Case</button> <button onclick="resetGame()">Reset</button></div></section><p class="lesson"><b>Mini lesson:</b> A logical fallacy is a mistake in reasoning. Learning them helps you judge arguments by logic and evidence.</p></main><script>const cases=[['Everyone online agrees, so it must be true.','Bandwagon','Popularity is not proof.'],['You cannot trust her argument because she is young.','Ad hominem','This attacks the person instead of the argument.'],['If we allow one redo, nobody will study ever again.','Slippery slope','It assumes one step causes an extreme chain reaction.'],['My uncle ate carrots and lived to 95, so carrots guarantee long life.','False cause','One example does not prove cause.'],['Support this plan completely or you hate progress.','False dilemma','It hides other possible choices.']];const opts=['Bandwagon','Ad hominem','Slippery slope','False cause','False dilemma'];let score=0,lives=3,i=0,answered=false;function render(){answered=false;let c=cases[i%cases.length];argument.textContent='“'+c[0]+'”';document.getElementById('score').textContent=score;livesEl();caseNo.textContent=i%cases.length+1;rank.textContent=score>=40?'Judge':score>=20?'Barrister':'Clerk';feedback.textContent='Select the fallacy.';choices.innerHTML='';opts.forEach(o=>{let b=document.createElement('button');b.textContent=o;b.onclick=()=>pick(o);choices.appendChild(b)})}function livesEl(){document.getElementById('lives').textContent=lives}function pick(o){if(answered||lives<=0)return;answered=true;let c=cases[i%cases.length];if(o===c[1]){score+=10;feedback.innerHTML='<b>Sustained.</b> '+c[2]}else{lives--;feedback.innerHTML='<b>Overruled.</b> Correct answer: '+c[1]+'. '+c[2];if(lives<=0)feedback.innerHTML+='<br><b>Court adjourned.</b>'}document.getElementById('score').textContent=score;livesEl()}function next(){if(lives<=0)return;i++;render()}function resetGame(){score=0;lives=3;i=0;render()}render();</script></body></html>
