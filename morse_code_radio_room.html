<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Morse Code Radio Room</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#031108;color:#7CFF9B;font-family:"Courier New",monospace;display:flex;align-items:center;justify-content:center;padding:20px}.box{width:min(920px,100%);border:3px solid #7CFF9B;border-radius:18px;padding:24px;background:linear-gradient(#061b0d,#020904);box-shadow:0 0 35px #1aff6a55}h1{margin:0 0 8px;text-shadow:0 0 12px #7CFF9B}.hud{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}.stat{border:1px solid #7CFF9B;border-radius:12px;padding:12px;text-align:center}.stat b{display:block;color:#fff176;font-size:26px}.signal{text-align:center;font-size:72px;letter-spacing:14px;border:2px dashed #7CFF9B;border-radius:14px;padding:28px;margin:18px 0}.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}button{background:#071f10;color:#7CFF9B;border:2px solid #7CFF9B;border-radius:12px;padding:13px;font-weight:bold;cursor:pointer}button:hover{background:#10351d}.nav{margin-top:12px}.feedback{min-height:65px;margin-top:14px;line-height:1.5;color:#dfffe5}.lesson{border-top:1px solid #7CFF9B;margin-top:18px;padding-top:14px;color:#caffd6}@media(max-width:700px){.hud,.choices{grid-template-columns:repeat(2,1fr)}} </style></head><body><main class="box"><h1>Morse Code Radio Room</h1><p>Decode emergency radio signals. A dot is short, a dash is long.</p><section class="hud"><div class="stat">Score<b id="score">0</b></div><div class="stat">Lives<b id="lives">3</b></div><div class="stat">Signal<b id="round">1</b></div><div class="stat">Rank<b id="rank">Cadet</b></div></section><div class="signal" id="signal">.-</div><div class="choices" id="choices"></div><div class="feedback" id="feedback">Choose the decoded letter.</div><div class="nav"><button onclick="next()">Next Signal</button> <button onclick="resetGame()">Reset</button></div><p class="lesson"><b>Mini lesson:</b> Morse code uses dots and dashes to represent letters. Example: A is <b>.-</b> and S is <b>...</b>.</p></main><script>const data=[['A','.-'],['B','-...'],['C','-.-.'],['D','-..'],['E','.'],['H','....'],['I','..'],['M','--'],['O','---'],['S','...'],['T','-']];let score=0,lives=3,i=0,answered=false;function sh(a){return[...a].sort(()=>Math.random()-.5)}function render(){answered=false;let d=data[i%data.length];signal.textContent=d[1];scoreEl();feedback.textContent='Choose the decoded letter.';choices.innerHTML='';let opts=sh([d[0],...sh(data.map(x=>x[0]).filter(x=>x!==d[0])).slice(0,3)]);opts.forEach(o=>{let b=document.createElement('button');b.textContent=o;b.onclick=()=>pick(o);choices.appendChild(b)})}function scoreEl(){score.textContent=score;document.getElementById('score').textContent=score;lives.textContent=lives;round.textContent=i%data.length+1;rank.textContent=score>=70?'Operator':score>=30?'Decoder':'Cadet'}function pick(o){if(answered||lives<=0)return;answered=true;let d=data[i%data.length];if(o===d[0]){score+=10;feedback.innerHTML='<b>Correct.</b> '+d[1]+' means '+d[0]+'.'}else{lives--;feedback.innerHTML='<b>Incorrect.</b> Correct answer: '+d[0]+'.';if(lives<=0)feedback.innerHTML+='<br><b>Transmission lost.</b>'}scoreEl()}function next(){if(lives<=0)return;i++;render()}function resetGame(){score=0;lives=3;i=0;render()}render();</script></body></html>
