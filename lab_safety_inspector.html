<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lab Safety Inspector</title><style>*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#eaf7ff;color:#103044;font-family:Arial,sans-serif;display:flex;align-items:center;justify-content:center;padding:20px}.app{width:min(1060px,100%);background:#fff;border:1px solid #c7e7f5;border-radius:28px;box-shadow:0 18px 50px #0c4a6e33;overflow:hidden}header{background:linear-gradient(90deg,#e0f7ff,#fff);padding:24px;border-bottom:1px solid #c7e7f5}h1{margin:0;color:#075985}.layout{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;padding:24px}.lab{min-height:390px;border-radius:22px;background:linear-gradient(#e0f2fe 0 55%,#cbd5e1 55%);border:2px solid #bae6fd;position:relative;overflow:hidden}.bench{position:absolute;left:30px;right:30px;bottom:80px;height:65px;background:#64748b;border-radius:18px}.item{position:absolute;font-size:58px}.goggles{left:75px;top:85px}.flask{left:250px;top:165px}.food{right:110px;top:165px}.spill{left:120px;bottom:105px}.fire{right:80px;bottom:105px}.panel{background:#f8fcff;border:1px solid #c7e7f5;border-radius:22px;padding:18px}.hud{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.stat{background:#e0f2fe;border-radius:14px;padding:12px;text-align:center}.stat b{display:block;font-size:24px;color:#0f766e}.question{font-size:21px;line-height:1.45;background:#fff;border-left:7px solid #0ea5e9;border-radius:12px;padding:14px;margin:14px 0}.choices{display:grid;gap:10px}button{border:0;border-radius:14px;background:#0ea5e9;color:white;padding:12px;font-weight:bold;cursor:pointer}button:hover{filter:brightness(1.08)}.feedback{min-height:70px;margin-top:12px;padding:12px;border-radius:14px;background:#ecfeff;line-height:1.5}.lesson{padding:0 24px 24px;color:#34657b}@media(max-width:850px){.layout{grid-template-columns:1fr}.hud{grid-template-columns:1fr}}</style></head><body><main class="app"><header><h1>Lab Safety Inspector</h1><p>Inspect the science lab and choose the safest action.</p></header><section class="layout"><div class="lab"><div class="item goggles">🥽</div><div class="item flask">⚗️</div><div class="item food">🍔</div><div class="item spill">🧪</div><div class="item fire">🔥</div><div class="bench"></div></div><div class="panel"><div class="hud"><div class="stat">Score<b id="score">0</b></div><div class="stat">Warnings<b id="warnings">3</b></div><div class="stat">Check<b id="checkNo">1</b></div></div><div class="question" id="question"></div><div class="choices" id="choices"></div><div class="feedback" id="feedback">Choose the safest lab action.</div><button onclick="next()">Next Check</button> <button onclick="resetGame()">Reset</button></div></section><p class="lesson"><b>Mini lesson:</b> Lab safety protects people and equipment. Wear goggles, do not eat in the lab, report spills, and follow instructions.</p></main><script>const q=[['A student will mix chemicals without goggles.','Put on safety goggles',['Put on safety goggles','Smell chemicals','Eat a snack','Run faster'],'Goggles protect eyes from splashes.'],['There is a chemical spill on the bench.','Tell the teacher and follow cleanup instructions',['Touch it','Tell the teacher and follow cleanup instructions','Ignore it','Blow on it'],'Spills should be reported and cleaned safely.'],['Someone brings food into the lab. Why unsafe?','Food can become contaminated',['It improves experiments','Food can become contaminated','It makes chemicals safer','It cools the lab'],'Lab surfaces may contain chemicals.'],['A beaker cracks during heating.','Stop and notify the teacher',['Keep heating','Pick it up bare-handed','Stop and notify the teacher','Hide it'],'Broken glass and hot liquid can injure people.']];let score=0,warnings=3,i=0,answered=false;function render(){answered=false;let x=q[i%q.length];question.textContent=x[0];document.getElementById('score').textContent=score;document.getElementById('warnings').textContent=warnings;checkNo.textContent=i%q.length+1;feedback.textContent='Choose the safest lab action.';choices.innerHTML='';x[2].forEach(c=>{let b=document.createElement('button');b.textContent=c;b.onclick=()=>pick(c);choices.appendChild(b)})}function pick(c){if(answered||warnings<=0)return;answered=true;let x=q[i%q.length];if(c===x[1]){score+=10;feedback.innerHTML='<b>Safe choice.</b> '+x[3]}else{warnings--;feedback.innerHTML='<b>Unsafe.</b> Correct answer: '+x[1]+'. '+x[3];if(warnings<=0)feedback.innerHTML+='<br><b>Inspection failed.</b>'}document.getElementById('score').textContent=score;document.getElementById('warnings').textContent=warnings}function next(){if(warnings<=0)return;i++;render()}function resetGame(){score=0;warnings=3;i=0;render()}render();</script></body></html>
